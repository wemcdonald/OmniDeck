name: Build Agent App

on:
  push:
    tags: ["agent-v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    outputs:
      windows-artifact-id: ${{ steps.upload-windows-installer.outputs.artifact-id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install project dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build agent sidecar
        shell: bash
        run: |
          cd agent
          bun build src/index.ts --compile --target=${{ matrix.bun_target }} \
            --outfile ../agent-app/src-tauri/sidecars/omnideck-agent-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing & notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: agent-app
          tagName: agent-v__VERSION__
          releaseName: "OmniDeck Agent v__VERSION__"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | **macOS** (Apple Silicon) | `OmniDeck.Agent_*_aarch64.dmg` |
            | **Windows** | `OmniDeck.Agent_*_x64-setup.exe` |
            | **Linux** (Debian/Ubuntu) | `OmniDeck.Agent_*_amd64.deb` |
            | **Linux** (RPM) | `OmniDeck.Agent_*_x86_64.rpm` |

            Download the file for your platform from the assets below.
          releaseDraft: false
          prerelease: false

      # Upload Windows installer as artifact for SignPath signing
      - name: Upload Windows installer for signing
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        id: upload-windows-installer
        with:
          name: windows-installer-unsigned
          path: agent-app/src-tauri/target/release/bundle/nsis/*.exe

  # Sign Windows installer via SignPath (runs after Windows build completes)
  sign-windows:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-unsigned
          path: unsigned

      - name: Submit signing request to SignPath
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: omnideck-agent
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          github-artifact-id: ${{ needs.build.outputs.windows-artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed installer to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALLER=$(ls signed/*.exe | head -1)
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" "$INSTALLER" --clobber
