# Captive portal DNS hijack for OmniDeck setup AP.
#
# NetworkManager's "shared" IPv4 mode starts an internal dnsmasq for the AP.
# Files in /etc/NetworkManager/dnsmasq-shared.d/ are merged into its config.
#
# The `address=/#/192.168.50.1` line answers every DNS query with the AP's IP,
# which is what drives iOS/Android captive-portal detection to trigger and
# point the user at our setup page. Effective only while the AP is up — this
# config file is ignored on other shared-mode profiles that don't point clients
# here.
address=/#/192.168.50.1
# Narrow TTL so phones refresh quickly once real Wi-Fi comes back
local-ttl=5
